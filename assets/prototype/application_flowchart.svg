<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#f6fbf9"/>
      <stop offset="100%" stop-color="#fff7f1"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39b8ff"/>
      <stop offset="100%" stop-color="#236cff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d4b3"/>
      <stop offset="100%" stop-color="#18a873"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1b3558" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#66758d"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 46px; font-weight: 850; fill: #172033; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 22px; fill: #66758d; }
      .section { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 25px; font-weight: 800; fill: #243047; }
      .card-title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 27px; font-weight: 820; fill: #1d2838; }
      .card-text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 19px; fill: #6b7890; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #7a879b; }
      .white { fill: #fff; }
      .white2 { fill: #eafff8; }
      .line { stroke: #66758d; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #91a1b6; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1380" cy="96" r="215" fill="#dff2ff" opacity="0.55"/>
  <circle cx="160" cy="880" r="240" fill="#dcfff4" opacity="0.55"/>

  <text x="80" y="78" class="title">伴生 APP 运营业务流程图</text>
  <text x="80" y="116" class="subtitle">展示用户从登录、创建 AI 伙伴，到日常陪伴、记忆沉淀、提醒与主动交流的完整业务闭环</text>

  <rect x="64" y="160" width="1472" height="165" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="100" y="205" class="section">一、进入应用</text>
  <rect x="100" y="230" width="270" height="70" rx="19" fill="url(#primary)"/>
  <text x="133" y="274" class="card-title white">打开伴生 APP</text>
  <path class="line" d="M392 265 H456"/>
  <rect x="482" y="222" width="300" height="86" rx="20" fill="#f5f9ff" stroke="#dce7f6"/>
  <text x="512" y="256" class="card-title">登录或授权</text>
  <text x="512" y="286" class="small">账号登录；后续支持微信登录</text>
  <path class="line" d="M804 265 H878"/>
  <rect x="894" y="222" width="302" height="86" rx="20" fill="#f5f9ff" stroke="#dce7f6"/>
  <text x="924" y="256" class="card-title">进入个人空间</text>
  <text x="924" y="286" class="small">加载用户资料、会话与历史记录</text>
  <path class="line" d="M1218 265 H1292"/>
  <rect x="1308" y="222" width="180" height="86" rx="20" fill="#f5f9ff" stroke="#dce7f6"/>
  <text x="1338" y="256" class="card-title">开始使用</text>
  <text x="1338" y="286" class="small">进入聊天首页</text>

  <rect x="64" y="365" width="1472" height="175" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="100" y="410" class="section">二、创建专属 AI 伙伴</text>
  <rect x="100" y="438" width="298" height="78" rx="20" fill="#f7fff9" stroke="#d6f0df"/>
  <text x="130" y="472" class="card-title">选择基础信息</text>
  <text x="130" y="500" class="small">昵称、性别、性格倾向</text>
  <path class="line" d="M420 477 H499"/>
  <rect x="515" y="438" width="325" height="78" rx="20" fill="#f7fff9" stroke="#d6f0df"/>
  <text x="545" y="472" class="card-title">生成角色画像</text>
  <text x="545" y="500" class="small">形成身份、外貌、经历、价值观</text>
  <path class="line" d="M862 477 H942"/>
  <rect x="958" y="438" width="372" height="78" rx="20" fill="#f7fff9" stroke="#d6f0df"/>
  <text x="988" y="472" class="card-title">建立初始记忆</text>
  <text x="988" y="500" class="small">让 AI 伙伴拥有稳定人设与长期陪伴基础</text>

  <rect x="64" y="580" width="1472" height="245" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="100" y="625" class="section">三、日常陪伴服务</text>
  <rect x="100" y="654" width="275" height="86" rx="20" fill="#fffdf8" stroke="#eee5d6"/>
  <text x="130" y="688" class="card-title">用户发起对话</text>
  <text x="130" y="718" class="small">聊天、倾诉、记录、提醒</text>
  <path class="line" d="M398 697 H454"/>
  <rect x="478" y="654" width="282" height="86" rx="20" fill="#fffdf8" stroke="#eee5d6"/>
  <text x="508" y="688" class="card-title">理解当前情境</text>
  <text x="508" y="718" class="small">结合上下文、情绪和重要记忆</text>
  <path class="line" d="M783 697 H838"/>
  <rect x="862" y="654" width="282" height="86" rx="20" fill="#fffdf8" stroke="#eee5d6"/>
  <text x="892" y="688" class="card-title">生成陪伴回应</text>
  <text x="892" y="718" class="small">自然聊天、情绪支持、分段回复</text>
  <path class="line" d="M1167 697 H1224"/>
  <rect x="1248" y="654" width="250" height="86" rx="20" fill="url(#green)"/>
  <text x="1278" y="688" class="card-title white">返回给用户</text>
  <text x="1278" y="718" class="small white2">实时展示回复与状态反馈</text>

  <path class="soft-line" d="M618 740 V782"/>
  <rect x="245" y="782" width="755" height="28" rx="14" fill="#f4f8ff"/>
  <text x="270" y="802" class="small">用户可随时更正、删除记忆；涉及重要事实变更时先询问确认，避免误记或误删。</text>

  <rect x="64" y="850" width="1472" height="108" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="100" y="888" class="section">四、长期陪伴与主动运营</text>
  <text x="100" y="918" class="card-text">每次互动后，系统沉淀有价值的用户记忆和 AI 自我记忆，更新亲密度与陪伴节奏。</text>
  <text x="100" y="948" class="card-text">在合适时间提供提醒、重要日期问候、沉默唤醒和个性化主动交流，并保留安全边界与用户控制权。</text>
</svg>
